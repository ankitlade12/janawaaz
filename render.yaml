# Render blueprint: web service + Postgres (pgvector).
#
# Scheduling: the Render Workflow service (created manually — New > Workflow,
# start command `python main.py`, name `janawaaz-workflows`) is triggered every
# 6h by .github/workflows/sweep-trigger.yml via the Render API. A Render Cron
# can replace that trigger later (cron has no free tier).

services:
  - type: web
    name: janawaaz-web
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn janawaaz.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: DATABASE_URL
        fromDatabase:
          name: janawaaz-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-opus-4-8
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: EMBEDDINGS_PROVIDER
        value: gemini
      - key: SARVAM_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false

databases:
  - name: janawaaz-db
    plan: free
    postgresMajorVersion: "16"
